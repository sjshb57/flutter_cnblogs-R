name: 生成更新信息(new_version.json)

# 发布 Release 时触发；也可在 Actions 页手动触发
on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen-version-json:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 根据 Release 生成 new_version.json
        env:
          # release 的 tag，如 v1.0.9 或 1.0.9
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
          HTML_URL: ${{ github.event.release.html_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # 手动触发(workflow_dispatch)时取最新的 release
          if [ -z "$TAG" ]; then
            TAG=$(gh release view --json tagName -q .tagName)
            BODY=$(gh release view --json body -q .body)
            HTML_URL=$(gh release view --json url -q .url)
          fi

          # 去掉可能的前缀 v，得到纯版本号 如 1.0.9
          VERSION="${TAG#v}"

          # version_num: 主*10000 + 次*100 + 修订
          # 1.1.0 -> 10100, 1.1.1 -> 10101, 1.1.10 -> 10110, 1.2.0 -> 10200
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          VERSION_NUM=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))

          # 取该 Release 第一个 .apk 资源作为下载地址，没有则回退到 Release 页面
          APK_URL=$(gh release view "$TAG" --json assets \
            -q '.assets[] | select(.name|endswith(".apk")) | .url' | head -n1 || true)
          DOWNLOAD_URL="${APK_URL:-$HTML_URL}"

          mkdir -p document

          # 用 jq 安全地写 JSON（自动处理换行/引号转义）
          jq -n \
            --arg version "$VERSION" \
            --argjson version_num "$VERSION_NUM" \
            --arg version_desc "$BODY" \
            --arg download_url "$DOWNLOAD_URL" \
            '{version:$version, version_num:$version_num, version_desc:$version_desc, download_url:$download_url}' \
            > document/new_version.json

          echo "生成结果："
          cat document/new_version.json

      - name: 提交并推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add document/new_version.json
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 更新 new_version.json (${{ github.event.release.tag_name }})"
            git push origin HEAD:master
          fi